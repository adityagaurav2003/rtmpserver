<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Streamyard Clone</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Streamyard Clone</h1>

    <section class="stream-setup">
      <input type="text" id="secretKeyInput" placeholder="Enter YouTube Live Secret Key" />
      <button id="start-btn">Start Streaming</button>
    </section>

    <div id="abr-panel" hidden>
      <span class="abr-row"><strong>Output:</strong> <span id="abr-quality">720p</span></span>
      <span class="abr-row"><strong>Socket RTT (p75):</strong> <span id="abr-latency">—</span></span>
      <p id="abr-health" class="abr-healthy">Adaptive bitrate idle</p>
    </div>

    <section class="video-container">
      <video id="user-video" autoplay muted></video>
    </section>

    <section class="stream-controls">
      <button id="pause-btn">Pause Stream</button>
      <button id="resume-btn" hidden>Resume Stream</button>
      <button id="stop-btn" disabled>Stop Stream</button>
      <button id="mute-btn">Mute</button>
      <button id="hide-btn">Hide Video</button>
    </section>

    <p id="connection-status">Socket Disconnected</p>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
